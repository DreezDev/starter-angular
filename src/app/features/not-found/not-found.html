<section class="not-found-container" role="main" aria-labelledby="not-found-title">
  <!-- Animated background shapes -->
  <div class="bg-shape bg-shape--1" aria-hidden="true"></div>
  <div class="bg-shape bg-shape--2" aria-hidden="true"></div>
  <div class="bg-shape bg-shape--3" aria-hidden="true"></div>

  <div class="not-found-content">
    <!-- Large 404 number -->
    <p class="not-found-code" aria-hidden="true">404</p>

    <!-- Icon -->
    <div class="not-found-icon" aria-hidden="true">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="icon">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.182 16.318A4.486 4.486 0 0 0 12.016 15a4.486 4.486 0 0 0-3.198 1.318M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z" />
      </svg>
    </div>

    <!-- Text content -->
    <div class="not-found-text">
      <h1 id="not-found-title" class="not-found-title">Page not found</h1>
      <p class="not-found-description">
        Sorry, we couldn't find the page you're looking for. It might have been moved, deleted, or
        never existed.
      </p>
    </div>

    <!-- Actions -->
    <div class="not-found-actions">
      <a [routerLink]="['/']" class="btn-primary" id="go-home-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="btn-icon"
          aria-hidden="true">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m2.25 12 8.954-8.955a1.126 1.126 0 0 1 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
        Go home
      </a>
      <a [routerLink]="['/']" class="btn-secondary" id="contact-support-btn"> Contact support </a>
    </div>
  </div>
</section>
